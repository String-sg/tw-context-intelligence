  <rect x="978" y="572" width="108" height="32" rx="2" fill="white" stroke="#ffe082" stroke-width="1"/>
  <text x="1032" y="592" text-anchor="middle" font-size="10" fill="#555">Report Gen</text>

  <line x1="118" y1="622" x2="1382" y2="622" stroke="#e0e0e0" stroke-width="1"/>

