  <text x="59" y="694" text-anchor="middle" font-size="10" font-weight="800" fill="#333" letter-spacing="0.8">CONTEXT</text>
  <text x="59" y="709" text-anchor="middle" font-size="9" fill="#999">grounding data</text>

  <!-- School Cockpit System of Record -->
  <rect x="126" y="628" width="404" height="140" rx="3" fill="#f3e5f5" stroke="#ce93d8" stroke-width="1"/>
  <text x="146" y="650" font-size="12" font-weight="700" fill="#6a1b9a">School Cockpit</text>
  <text x="146" y="666" font-size="9" font-weight="700" fill="#7b1fa2" letter-spacing="0.8">SYSTEM OF RECORD</text>
  <text x="146" y="686" font-size="11" fill="#444">Authoritative operational record. One master</text>
  <text x="146" y="702" font-size="11" fill="#444">per data element. Feeds 35+ downstream</text>
  <text x="146" y="718" font-size="11" fill="#444">national systems.</text>

  <!-- EduHub -->
  <rect x="538" y="628" width="404" height="140" rx="3" fill="#e8f5e9" stroke="#a5d6a7" stroke-width="1"/>
  <text x="558" y="650" font-size="12" font-weight="700" fill="#1b5e20">EduHub</text>
  <text x="558" y="666" font-size="9" font-weight="700" fill="#2e7d32" letter-spacing="0.8">EXCHANGE + ANALYTICS</text>
  <text x="558" y="686" font-size="11" fill="#444">Governed exchange and analytical lakehouse.</text>
  <text x="558" y="702" font-size="11" fill="#444">Two jobs: fast exchange, system of record</text>
  <text x="558" y="718" font-size="11" fill="#444">here. One system, two architectural roles.</text>

