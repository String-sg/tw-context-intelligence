<svg viewBox="0 0 1400 860" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <rect width="1400" height="860" fill="white"/>

  <!-- Top label -->
  <text x="20" y="20" font-size="10" font-weight="700" fill="#888" letter-spacing="1.5">THE EDUCATOR ECOSYSTEM</text>
  <line x1="0" y1="28" x2="1400" y2="28" stroke="#e0e0e0" stroke-width="1"/>

  <!-- Title -->
  <text x="20" y="68" font-size="36" font-weight="800" fill="#111">How everything fits in, organised by purpose</text>
  <text x="20" y="92" font-size="14" fill="#777">Jobs To Be Done as viewed by educators. All on a shared platform.</text>
  <line x1="0" y1="108" x2="1400" y2="108" stroke="#e0e0e0" stroke-width="1"/>

  <!-- Left labels column -->
  <rect x="0" y="108" width="118" height="652" fill="#f8f9fb"/>
  <line x1="118" y1="108" x2="118" y2="760" stroke="#e0e0e0" stroke-width="1"/>

  <!-- ── IDENTITY row: 108–172 ── -->
  <text x="59" y="134" text-anchor="middle" font-size="10" font-weight="800" fill="#333" letter-spacing="0.8">IDENTITY</text>
  <text x="59" y="149" text-anchor="middle" font-size="9" fill="#999">who you are</text>

  <rect x="126" y="114" width="1256" height="52" rx="3" fill="#eaeff8" stroke="#b8c8e8" stroke-width="1"/>
  <text x="146" y="135" font-size="13" font-weight="700" fill="#1a237e">Edupass</text>
  <text x="222" y="135" font-size="12" fill="#444">   Identity &amp; access context. SSO across all DWSB products; each product enforces its own permissions.</text>
  <rect x="1208" y="120" width="166" height="24" rx="12" fill="#00897b"/>
  <text x="1291" y="136" text-anchor="middle" font-size="10" font-weight="600" fill="white">Done by Edupass Team</text>

  <line x1="118" y1="172" x2="1382" y2="172" stroke="#e0e0e0" stroke-width="1"/>

  <!-- ── ENGAGEMENT row: 172–252 ── -->
