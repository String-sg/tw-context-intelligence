  <text x="59" y="218" text-anchor="middle" font-size="9" fill="#999">what teachers see</text>

  <rect x="126" y="178" width="616" height="68" rx="3" fill="#eaeff8" stroke="#b8c8e8" stroke-width="1"/>
  <text x="146" y="200" font-size="13" font-weight="700" fill="#1a237e">Teacher Workspace</text>
  <rect x="630" y="184" width="100" height="22" rx="11" fill="#e65100"/>
  <text x="680" y="199" text-anchor="middle" font-size="9" font-weight="700" fill="white">FRONT DOOR</text>
  <text x="146" y="220" font-size="11" fill="#555">Front door: presents, captures, coordinates 17+ tools. Owns no business logic.</text>

  <rect x="750" y="178" width="632" height="68" rx="3" fill="#eaeff8" stroke="#b8c8e8" stroke-width="1"/>
  <text x="770" y="200" font-size="13" font-weight="700" fill="#1a237e">TW Mobile</text>
  <rect x="1276" y="184" width="98" height="22" rx="11" fill="#e65100"/>
  <text x="1325" y="199" text-anchor="middle" font-size="9" font-weight="700" fill="white">EXPLORATION</text>
  <text x="770" y="220" font-size="11" fill="#555">Companion app: attendance, profiles, incident logging.</text>

  <line x1="118" y1="252" x2="1382" y2="252" stroke="#e0e0e0" stroke-width="1"/>

  <!-- ── INTELLIGENCE row: 252–350 ── -->
  <text x="59" y="284" text-anchor="middle" font-size="10" font-weight="800" fill="#333" letter-spacing="0.8">INTELLIGENCE</text>
  <text x="59" y="299" text-anchor="middle" font-size="9" fill="#999">right info, right time</text>

  <rect x="126" y="258" width="1256" height="86" rx="3" fill="#e0f2f1" stroke="#80cbc4" stroke-width="1.5"/>
  <text x="146" y="280" font-size="13" font-weight="700" fill="#004d40">Educator Productivity Intelligence Gateway</text>
  <rect x="1180" y="263" width="194" height="24" rx="12" fill="#00897b"/>
  <text x="1277" y="279" text-anchor="middle" font-size="9" font-weight="700" fill="white">CONTEXTUAL INTELLIGENCE</text>
  <text x="146" y="302" font-size="11" fill="#444">Routes requests, evaluates data triggers, runs AI Assist, retrieves contextual guidance (RAG), and composes multi-system responses.</text>
  <text x="146" y="318" font-size="11" fill="#444">Owns write-back and the reconciliation ledger.</text>
  <text x="146" y="334" font-size="10" fill="#888" font-style="italic">Guardrails (data classification, Sensitive-High masking, output grounding, audit) are embedded, not external.</text>

  <line x1="118" y1="350" x2="1382" y2="350" stroke="#e0e0e0" stroke-width="1"/>

  <!-- WHAT EDUCATORS NEED DONE subheader -->
  <text x="146" y="367" font-size="10" font-weight="700" fill="#aaa" letter-spacing="0.8">WHAT EDUCATORS NEED DONE</text>

  <!-- ── WORK row: 350–540 ── -->
  <text x="59" y="438" text-anchor="middle" font-size="10" font-weight="800" fill="#333" letter-spacing="0.8">WORK</text>
  <text x="59" y="453" text-anchor="middle" font-size="9" fill="#999">jobs to be done</text>

