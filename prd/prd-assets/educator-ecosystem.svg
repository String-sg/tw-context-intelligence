  <line x1="544" y1="370" x2="544" y2="540" stroke="#e8e8e8" stroke-width="1"/>
  <line x1="753" y1="370" x2="753" y2="540" stroke="#e8e8e8" stroke-width="1"/>
  <line x1="962" y1="370" x2="962" y2="540" stroke="#e8e8e8" stroke-width="1"/>
