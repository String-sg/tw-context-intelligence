  <text x="970" y="650" font-size="12" font-weight="700" fill="#0d47a1">Knowledge Bases</text>
  <text x="970" y="666" font-size="9" font-weight="700" fill="#1565c0" letter-spacing="0.8">BUSINESS-OWNED</text>
  <text x="970" y="686" font-size="11" fill="#444">Curated domain guidance from business</text>
  <text x="970" y="702" font-size="11" fill="#444">partners (SD, SEAB, SDCD, DXD).</text>
  <text x="970" y="718" font-size="11" fill="#444">Feeds the Intelligence layer.</text>

  <line x1="0" y1="774" x2="1400" y2="774" stroke="#e0e0e0" stroke-width="1"/>

  <!-- Footer -->
  <text x="20" y="796" font-size="10" fill="#666" font-style="italic">School Cockpit spans Work and Context: compute engine above, system of record here. One system, two architectural roles.</text>
  <text x="20" y="816" font-size="10" fill="#777">Adjacent surfaces (not DWSB-owned, fed by EduHub): Student Space · Student Learning Space · Parents Gateway · external apps (Google, OpenAI).</text>

  <!-- DXD logo -->
  <rect x="20" y="828" width="44" height="26" rx="3" fill="#1a2744"/>
